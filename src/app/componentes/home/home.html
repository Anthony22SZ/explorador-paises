<div class="contenedor-principal">
  
  <header class="barra-busqueda">
    <div class="input-wrapper">
      <svg class="icono-lupa" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input 
        type="text" 
        placeholder="Escribe el nombre de un país..." 
        (input)="alBuscar($event)"
        class="input-buscar"
      />
    </div>
  </header>

  <main class="contenido-paises">
    @if (paisesEncontrados().length > 0) {
      <app-listas-paises 
        [paises]="paisesEncontrados()"
        (alVerDetalle)="abrirDetalle($event)" 
        (alVerClima)="abrirClima($event)">
      </app-listas-paises>
    } @else {
      <div class="mensaje-bienvenida">
        <p>Escribe el nombre de un país para comenzar la búsqueda...</p>
      </div>
    }
  </main>

  @if (modalVisible()) {
    <app-modal-pais
      [pais]="paisSeleccionado()"
      [tipo]="tipoModal()"
      (cerrar)="cerrarModal()">
    </app-modal-pais>
  }

</div>
